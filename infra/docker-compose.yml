# StreamCell local MVP infrastructure
#
# Network:
# - streamcell-net: shared Docker bridge network for Kafka, Flink, PostgreSQL, and Kafka UI.
# - Containers should use service names for internal DNS, for example kafka-1:9092 or postgres:5432.
# - Host tools should use localhost ports documented below.
#
# Quick start:
#   docker compose -f infra/docker-compose.yml up -d
#
# Kafka bootstrap servers:
# - From host:      localhost:19092,localhost:19093,localhost:19094
# - From Docker:    kafka-1:9092,kafka-2:9092,kafka-3:9092
#
# PostgreSQL:
# - From host:      localhost:5432
# - From Docker:    postgres:5432
# - Database:       streamcell
# - User/password:  streamcell / streamcell
#
# Flink:
# - Web UI:         http://localhost:8081
# - SQL Gateway:   http://localhost:8083
#
# Kafka UI:
# - Web UI:         http://localhost:8080

name: streamcell

services:
  # Kafka broker 1
  # Host port 19092 exposes this broker for local CLI/tools.
  kafka-1:
    image: confluentinc/cp-kafka:7.7.1
    container_name: streamcell-kafka-1
    networks:
      - streamcell-net
    ports:
      - "19092:19092"
    environment:
      CLUSTER_ID: "q1Sh-9_ISia_zwGINzRvyQ"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://kafka-1:9092,CONTROLLER://kafka-1:9093,EXTERNAL://0.0.0.0:19092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9092,EXTERNAL://localhost:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
    volumes:
      - kafka-1-confluent-data:/var/lib/kafka/data

  # Kafka broker 2
  # Host port 19093 exposes this broker for local CLI/tools.
  kafka-2:
    image: confluentinc/cp-kafka:7.7.1
    container_name: streamcell-kafka-2
    networks:
      - streamcell-net
    ports:
      - "19093:19093"
    environment:
      CLUSTER_ID: "q1Sh-9_ISia_zwGINzRvyQ"
      KAFKA_NODE_ID: "2"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://kafka-2:9092,CONTROLLER://kafka-2:9093,EXTERNAL://0.0.0.0:19093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:9092,EXTERNAL://localhost:19093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
    volumes:
      - kafka-2-confluent-data:/var/lib/kafka/data

  # Kafka broker 3
  # Host port 19094 exposes this broker for local CLI/tools.
  kafka-3:
    image: confluentinc/cp-kafka:7.7.1
    container_name: streamcell-kafka-3
    networks:
      - streamcell-net
    ports:
      - "19094:19094"
    environment:
      CLUSTER_ID: "q1Sh-9_ISia_zwGINzRvyQ"
      KAFKA_NODE_ID: "3"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://kafka-3:9092,CONTROLLER://kafka-3:9093,EXTERNAL://0.0.0.0:19094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-3:9092,EXTERNAL://localhost:19094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
    volumes:
      - kafka-3-confluent-data:/var/lib/kafka/data

  # One-shot topic initializer.
  # Creates the MVP orders topic after the Kafka cluster is reachable.
  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: streamcell-kafka-init
    networks:
      - streamcell-net
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Waiting for Kafka brokers...' &&
      until kafka-topics --bootstrap-server kafka-1:9092 --list >/dev/null 2>&1; do sleep 3; done &&
      kafka-topics --bootstrap-server kafka-1:9092,kafka-2:9092,kafka-3:9092 --create --if-not-exists --topic orders --partitions 3 --replication-factor 3 &&
      echo 'Kafka topic created: orders'
      "

  # Kafka UI for local inspection.
  # Host port 8080: http://localhost:8080
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: streamcell-kafka-ui
    networks:
      - streamcell-net
    ports:
      - "8080:8080"
    depends_on:
      kafka-1:
        condition: service_started
      kafka-2:
        condition: service_started
      kafka-3:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_CLUSTERS_0_NAME: "streamcell-local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"

  # PostgreSQL target database for Flink sink results.
  # Host port 5432: localhost:5432
  postgres:
    image: postgres:16-alpine
    container_name: streamcell-postgres
    networks:
      - streamcell-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "streamcell"
      POSTGRES_USER: "streamcell"
      POSTGRES_PASSWORD: "streamcell"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../sql/ddl/V2__init_schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamcell -d streamcell"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Flink JobManager.
  # Host port 8081: Flink Web UI at http://localhost:8081
  flink-jobmanager:
    image: flink:1.19.1-scala_2.12-java17
    container_name: streamcell-flink-jobmanager
    networks:
      - streamcell-net
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.address: 0.0.0.0
        rest.bind-address: 0.0.0.0
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./flink/lib/flink-sql-connector-kafka-3.2.0-1.19.jar:/opt/flink/lib/flink-sql-connector-kafka-3.2.0-1.19.jar
      - ./flink/lib/flink-connector-jdbc-3.2.0-1.19.jar:/opt/flink/lib/flink-connector-jdbc-3.2.0-1.19.jar
      - ./flink/lib/postgresql-42.7.3.jar:/opt/flink/lib/postgresql-42.7.3.jar

  # Flink TaskManager.
  # No host port is exposed; it communicates with JobManager over streamcell-net.
  flink-taskmanager:
    image: flink:1.19.1-scala_2.12-java17
    container_name: streamcell-flink-taskmanager
    networks:
      - streamcell-net
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
    depends_on:
      - flink-jobmanager
    volumes:
      - ./flink/lib/flink-sql-connector-kafka-3.2.0-1.19.jar:/opt/flink/lib/flink-sql-connector-kafka-3.2.0-1.19.jar
      - ./flink/lib/flink-connector-jdbc-3.2.0-1.19.jar:/opt/flink/lib/flink-connector-jdbc-3.2.0-1.19.jar
      - ./flink/lib/postgresql-42.7.3.jar:/opt/flink/lib/postgresql-42.7.3.jar

  # Flink SQL Gateway.
  # Host port 8083: SQL Gateway REST endpoint at http://localhost:8083
  # The SQL Gateway can be used later to submit Flink SQL that reads Kafka and writes PostgreSQL.
  # Connector JARs for Kafka/JDBC/PostgreSQL must be added to the Flink image or mounted before running SQL jobs.
  flink-sql-gateway:
    image: flink:1.19.1-scala_2.12-java17
    container_name: streamcell-flink-sql-gateway
    networks:
      - streamcell-net
    ports:
      - "8083:8083"
    command: >
      bash -c "./bin/sql-gateway.sh start-foreground
      -Dsql-gateway.endpoint.rest.address=0.0.0.0
      -Dsql-gateway.endpoint.rest.port=8083
      -Djobmanager.rpc.address=flink-jobmanager"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 1
    depends_on:
      - flink-jobmanager
      - flink-taskmanager

networks:
  # Shared local-only Docker network for all StreamCell services.
  streamcell-net:
    name: streamcell-net
    driver: bridge

volumes:
  kafka-1-confluent-data:
  kafka-2-confluent-data:
  kafka-3-confluent-data:
  postgres-data:

