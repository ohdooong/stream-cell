server:
  port: 8085

spring:
  application:
    name: streamcell

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

flink:
  base-url: ${FLINK_JOB_MANAGER_URL}
  
file:
  upload:
    dir: C:\streamcell_workspace\upload
    custom-jar-path: C:\streamcell_workspace\upload\flink\artifacts

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  mapper-locations: classpath:/mapper/**/*.xml
  type-handlers-package: com.streamcell.global.helper.typehandler

logging:
  level:
    root: INFO
    com.streamcell: DEBUG
    org.mybatis: DEBUG
    org.apache.ibatis: DEBUG

springdoc:
  packages-to-scan: com.streamcell.platform
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  swagger-ui:
    path: /swagger-ui
    doc-expansion: none
